<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — ExpenseSync</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #f5f5f5;
      color: #111;
      font-family: system-ui, sans-serif;
      padding: 2rem env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1c1917; color: #f5f5f4; }
      button { background: #15803d; color: #fff; }
      button:hover { background: #166534; }
    }
    svg { color: #16a34a; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    p { font-size: 0.875rem; color: #6b7280; max-width: 280px; }
    button {
      margin-top: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      border: none;
      background: #16a34a;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 6l5 5 4-4 4 4 5-5"/>
    <line x1="1" y1="1" x2="23" y2="23"/>
  </svg>
  <h1>You're offline</h1>
  <p>Check your connection and try again. Your data is safe and will sync when you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
