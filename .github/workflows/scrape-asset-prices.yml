name: Scrape Asset Prices

on:
  schedule:
    # 11:00 AM Nepal Time (UTC+5:45) = 05:15 UTC, Sunday–Friday
    - cron: '15 5 * * 0-5'
    # 4:00 PM Nepal Time (UTC+5:45) = 10:15 UTC, Sunday–Friday
    - cron: '15 10 * * 0-5'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scrape asset prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm scrape:asset-prices
